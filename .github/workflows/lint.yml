name: Lint & Quality

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      shell: bash

    - name: Install uv-deps-switcher
      run: |
        uv tool install git+https://github.com/PhoPersonalOrg/uv-deps-switcher.git
        echo "$HOME/.local/bin" >> $GITHUB_PATH
      shell: bash

    - name: Switch to release mode
      run: |
        uv-deps-switcher release
      shell: bash

    - name: Cache UV installation
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-lint-${{ hashFiles('**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-lint-

    - name: Sync dependencies
      run: |
        uv sync --all-extras

    - name: Run ruff check
      run: |
        uv run ruff check pypho_timeline tests --show-fixes || true
        echo "Note: ruff check is informational, not blocking"

    - name: Check for type issues with pyright (if available)
      run: |
        uv pip list | grep pyright > /dev/null && (uv run pyright pypho_timeline || true) || echo "pyright not installed, skipping"
      shell: bash
      continue-on-error: true

    - name: Verify imports
      run: |
        python -c "import pypho_timeline; print('✓ Main package imports successfully')"
        python -c "from pypho_timeline import __main__; print('✓ Main module imports successfully')"

  quality-summary:
    runs-on: ubuntu-latest
    needs: lint
    if: always()
    steps:
      - name: Lint summary
        run: |
          echo "Linting checks completed"
          echo "Note: Style issues are warnings, not blocking failures"
