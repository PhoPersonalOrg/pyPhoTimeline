name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      shell: bash

    - name: Install uv-deps-switcher
      run: |
        uv tool install git+https://github.com/PhoPersonalOrg/uv-deps-switcher.git
        echo "$HOME/.local/bin" >> $GITHUB_PATH
      shell: bash

    - name: Switch to release mode (CI doesn't have sibling repos)
      run: |
        uv-deps-switcher release
      shell: bash

    - name: Cache UV installation
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Sync dependencies
      run: |
        uv sync --all-extras

    - name: List installed packages
      run: |
        uv pip list

    - name: Run tests
      run: |
        python -m unittest discover -s tests -p 'test_*.py' -v

  test-summary:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Test summary
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✓ All tests passed"
            exit 0
          else
            echo "✗ Some tests failed"
            exit 1
          fi
