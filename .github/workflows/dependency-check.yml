name: Dependency Check

on:
  push:
    branches: [ master, main, develop ]
    paths: ['pyproject.toml', 'uv.lock', 'templating/**']
  pull_request:
    branches: [ master, main, develop ]
    paths: ['pyproject.toml', 'uv.lock', 'templating/**']

jobs:
  dependency-sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      shell: bash

    - name: Check if uv.lock is in sync with pyproject.toml (release mode)
      run: |
        uv lock --locked
      continue-on-error: true

    - name: Report status
      run: |
        echo "Dependency check complete"
        echo "If uv.lock is out of sync, run locally:"
        echo "  uv lock"
        echo "  git add uv.lock && git commit -m 'Update uv.lock'"

  build-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install UV
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      shell: bash

    - name: Install uv-deps-switcher
      run: |
        uv tool install git+https://github.com/PhoPersonalOrg/uv-deps-switcher.git
        echo "$HOME/.local/bin" >> $GITHUB_PATH
      shell: bash

    - name: Switch to release mode
      run: |
        uv-deps-switcher release
      shell: bash

    - name: Build package
      run: |
        uv sync --all-extras
        python -m pip install -e .
        python -c "import pypho_timeline; print(f'✓ Package builds successfully: version {pypho_timeline.__version__ if hasattr(pypho_timeline, \"__version__\") else \"unknown\"}')"
