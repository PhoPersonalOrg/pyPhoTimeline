[project]
name = "py-pho-timeline"
version = "0.2.1"
description = "A library for creating time-synchronized timeline widgets with docked tracks"
readme = "README.md"
requires-python = ">=3.9,<3.12"
dependencies = [
    "attrs>=22.2.0,<23",
    "numpy>=1.20.0",
    "pandas>=1.3.0",
    "qtpy>=2.0.0",
    "nptyping>=2.0.0",
    # External dependencies from other repos (should be installed separately)
    "pyphocorehelpers",
    "neuropy",
    "pyphoplacecellanalysis", # For pyqtgraph extensions and utilities
    "pyqt5singleton>=0.1",
    "pyqtgraph>=0.13.7",
    "plotly>=6.5.0",
    "awkward>=2.8.11",
]

[tool.uv.sources]
pyphoplacecellanalysis = { path = "../pyPhoPlaceCellAnalysis", editable = true }
neuropy = { path = "../NeuroPy", editable = true }
pyphocorehelpers = { path = "../pyPhoCoreHelpers", editable = true }

[build-system]
requires = ["setuptools>=80.9.0", "wheel>=0.45.1"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["pypho_timeline"]

[tool.setuptools.package-data]
pypho_timeline = ["py.typed"]
